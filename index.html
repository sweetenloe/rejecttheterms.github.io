<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Reject the Terms</title>
  <meta name="description" content="Privacy-focused writing on consent, surveillance defaults, and the fine print that follows everyday technology.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
  <style>
    .front-page {
      height: 100svh;
      overflow: hidden;
    }

    .front-page main {
      height: 100svh;
      padding-top: 0;
      overflow: hidden;
    }

    .front-page .hero {
      height: 100svh;
      min-height: 100svh;
      border-bottom: 0;
    }

    .front-page .hero__inner {
      padding: 0;
      display: flex;
      justify-content: center;
    }

    .front-page .hero-console {
      max-width: 1100px;
      text-align: center;
    }

    .front-page .hero__title {
      margin-left: auto;
      margin-right: auto;
    }

    .front-page .hero-meta {
      display: inline-block;
      text-align: left;
    }

    .front-page .hero__copy {
      margin-left: auto;
      margin-right: auto;
    }
  </style>
  <script src="script.js" defer></script>
</head>

  <canvas class="matrix-wallpaper" id="matrix-wallpaper" aria-hidden="true"></canvas>
  <div class="parallax-stage" aria-hidden="true">

    <div class="parallax-layer layer-frame layer-frame--one" data-depth="0.16"></div>
    <div class="parallax-layer layer-frame layer-frame--two" data-depth="-0.1"></div>
    <div class="parallax-layer layer-terminal" data-depth="0.22"></div>
    <div class="parallax-layer layer-docs" data-depth="-0.18"></div>
  </div>

  <a class="hidden-articles-link" href="articles.html" aria-label="Open articles" style="z-index:200"></a>
